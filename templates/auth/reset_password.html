{% extends 'base.html' %}
{% block titulo %}Redefinir senha{% endblock %}

{% block conteudo %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg p-4" style="max-width: 450px; width: 100%;">
    <div class="card-body">
      <h3 class="card-title text-center mb-4">Redefinir Senha</h3>
      <p class="text-muted text-center">Digite sua nova senha abaixo.</p>

      <form method="post">
        <div class="mb-3">
          <label for="senha" class="form-label">Nova Senha</label>
          <input type="password" name="senha" id="senha" class="form-control" required autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label for="confirmar_senha" class="form-label">Confirmar Nova Senha</label>
          <input type="password" name="confirmar_senha" id="confirmar_senha" class="form-control" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-check-circle"></i> Salvar nova senha
        </button>
      </form>

      <div class="text-center mt-3">
        <small><a href="{{ url_for('auth.login') }}">Voltar ao login</a></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}
