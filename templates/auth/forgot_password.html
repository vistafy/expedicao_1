{% extends 'base.html' %}
{% block titulo %}Esqueceu sua senha{% endblock %}

{% block conteudo %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg p-4" style="max-width: 450px; width: 100%;">
    <div class="card-body">
      <h3 class="card-title text-center mb-4">Recuperar Senha</h3>
      <p class="text-muted text-center">Digite seu CPF e e-mail para receber um link de redefinição.</p>

      <form method="post">
        <div class="mb-3">
          <label for="cpf" class="form-label">CPF</label>
          <input type="text" name="cpf" id="cpf" class="form-control" required maxlength="14" autocomplete="off" placeholder="000.000.000-00">
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" name="email" id="email" class="form-control" required autocomplete="email">
        </div>

        <button type="submit" class="btn btn-warning w-100">
          <i class="bi bi-envelope"></i> Enviar link
        </button>
      </form>

      <div class="text-center mt-3">
        <small><a href="{{ url_for('auth.login') }}">Voltar ao login</a></small>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Máscara para CPF
document.getElementById("cpf").addEventListener("input", function(e) {
  let valor = e.target.value.replace(/\D/g, "");
  if (valor.length > 11) valor = valor.slice(0, 11);
  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
  e.target.value = valor;
});
</script>
{% endblock %}
