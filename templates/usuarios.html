{% extends 'base.html' %}
{% block titulo %}Usuários{% endblock %}

{% block conteudo %}
<div class="container py-4">
  <h2 class="mb-4">Usuários</h2>
  <a href="{{ url_for('usuarios.novo') }}" class="btn btn-primary mb-3">Novo Usuário</a>
  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Usuário</th>
      </tr>
    </thead>
    <tbody>
      {% for usuario in usuarios %}
      <tr>
        <td>{{ usuario.id }}</td>
        <td>{{ usuario.username }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
